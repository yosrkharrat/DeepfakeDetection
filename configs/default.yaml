data:
  raw_dir: data/raw/FaceForensics++_C23
  processed_dir: data/processed
  splits_dir: data/splits
  image_size: 224
  frame_stride: 10
  max_frames_per_video: 50
  min_face_size: 64

model:
  rgb_feature_dim: 512
  fft_feature_dim: 256
  fusion_hidden_dims: [256, 64]
  fusion_dropout: 0.5
  fft_dropout: 0.3

training:
  batch_size: 32
  epochs: 50
  learning_rate: 1.0e-4
  lr_step_size: 10
  lr_gamma: 0.5
  early_stopping_patience: 5
  seed: 42
  device: cuda
  num_workers: 4
  checkpoint_every_n_epochs: 5
  data_split:
    train: 0.70
    val: 0.15
    test: 0.15

augmentation:
  normalize:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]
  train:
    flip_p: 0.5
    rotate_limit: 15
    rotate_p: 0.4
    jpeg_quality_min: 60
    jpeg_quality_max: 100
    jpeg_p: 0.3
    brightness_contrast_p: 0.4

paths:
  checkpoints: results/checkpoints
  tensorboard: runs
  metrics: results/metrics.json
