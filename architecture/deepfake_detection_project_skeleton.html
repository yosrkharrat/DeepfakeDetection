</style>

function makeTag(tag) {
  if (!tag) return '';
  const labels = { done: '✓ done', todo: 'todo', yours: '★ yours' };
  return `<span class="tag ${tag}">${labels[tag]}</span>`;
}

let openDesc = null;

function renderEntry(entry, depth) {
  const id = 'e' + Math.random().toString(36).slice(2);
  const descId = 'd' + id;
  const childId = 'c' + id;
  const isDir = !!entry.children;
  const indent = '  '.repeat(depth);

  let html = `<div class="entry" style="padding-left:${depth * 16}px">
    <div class="label-row" onclick="toggle('${id}','${descId}','${childId}')">
      ${isDir ? `<span class="caret" id="${id}">▶</span>` : '<span style="width:12px;flex-shrink:0"></span>'}
      <span class="icon">${entry.icon}</span>
      <span class="name">${entry.name}</span>
      ${makeTag(entry.tag)}
    </div>
  </div>
  <div class="desc-box children collapsed" id="${descId}" style="margin-left:${depth * 16 + 30}px">${entry.desc || ''}</div>`;

  if (isDir) {
    html += `<div class="children collapsed" id="${childId}">`;
    for (const child of entry.children) {
      html += renderEntry(child, depth + 1);
    }
    html += '</div>';
  }
  return html;
}

const container = document.getElementById('tree');
container.innerHTML = '<div style="padding:4px 6px 10px;font-size:11px;color:var(--color-text-tertiary)">Click any file or folder to see what it contains</div>'
  + TREE.map(e => renderEntry(e, 0)).join('');

function toggle(caretId, descId, childId) {
  const caret = document.getElementById(caretId);
  const desc = document.getElementById(descId);
  const child = document.getElementById(childId);
  const isOpen = !desc.classList.contains('collapsed');

  desc.classList.toggle('collapsed');
  if (child) child.classList.toggle('collapsed');
  if (caret) caret.classList.toggle('open', !isOpen);
}
